<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clean MP3 Converter</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <div class="box">
    <h1>Clean MP3 Converter</h1>
    <p>Upload an audio or video file and convert it to MP3.</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    {% if download_file %}
      <a class="download" href="{{ url_for('download', filename=download_file) }}">Download MP3</a>
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
      <input type="file" name="file" required>

      <select name="quality">
        <option value="128k">128 kbps</option>
        <option value="192k" selected>192 kbps</option>
        <option value="256k">256 kbps</option>
        <option value="320k">320 kbps</option>
      </select>

      <button type="submit">Convert to MP3</button>
    </form>
  </div>
</body>
</html>
