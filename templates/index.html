<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video Converter</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <header class="hero">
    <h1>Video Converter</h1>
    <p>Convert videos to MP3 or MP4 and download them.</p>
  </header>

  <main class="wrap">
    <section class="converter-card">
      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/" enctype="multipart/form-data">
        <label>Upload video/audio file</label>
        <input type="file" name="file" accept="audio/*,video/*" required>

        <div class="row">
          <div class="format-tabs">
            <label>
              <input type="radio" name="output_type" value="mp3" checked>
              <span>MP3</span>
            </label>

            <label>
              <input type="radio" name="output_type" value="mp4">
              <span>MP4</span>
            </label>
          </div>

          <button type="submit">Convert & Download</button>
        </div>

        <select name="quality">
          <option value="128k">MP3 128 kbps</option>
          <option value="192k" selected>MP3 192 kbps</option>
          <option value="256k">MP3 256 kbps</option>
          <option value="320k">MP3 320 kbps</option>
        </select>
      </form>
    </section>
  </main>
</body>
</html>
